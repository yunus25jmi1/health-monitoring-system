<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal - Smart Health</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">👤 Patient Portal</h1>
        <div class="flex items-center space-x-4">
            <span id="patName" class="font-medium">User</span>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm transition">Logout</button>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-4xl">
        <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-indigo-100">
            <h2 class="text-2xl font-bold text-gray-800">Welcome back!</h2>
            <p class="text-gray-500">Your health reports and AI-driven insights are listed below.</p>
        </div>

        <h3 class="text-lg font-semibold mb-4 text-gray-700">My Medical Reports</h3>
        
        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto"></div>
        </div>

        <div id="reportList" class="space-y-4">
            <!-- Reports injected here -->
        </div>

        <div id="emptyMsg" class="hidden text-center py-20 bg-white rounded-xl border border-gray-100">
            <p class="text-gray-400">No medical reports found in your account.</p>
        </div>
    </div>

    <script>
        const API_BASE = "/api/v1";
        const token = localStorage.getItem('sh_token');
        const userId = localStorage.getItem('sh_uid');

        if (!token || localStorage.getItem('sh_role') !== 'patient') {
            window.location.href = 'index.html';
        }

        document.getElementById('patName').innerText = localStorage.getItem('sh_name') || "User";

        async function fetchPatientReports() {
            try {
                const res = await fetch(`${API_BASE}/reports/patient/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                document.getElementById('loading').classList.add('hidden');
                const list = document.getElementById('reportList');
                list.innerHTML = "";

                if (data.data && data.data.length > 0) {
                    data.data.forEach(report => {
                        const isApproved = report.status === 'approved';
                        const item = document.createElement('div');
                        item.className = `p-5 rounded-lg border flex justify-between items-center transition ${isApproved ? 'bg-white border-green-100 hover:border-green-300' : 'bg-gray-50 border-gray-200'}`;
                        
                        item.innerHTML = `
                            <div>
                                <h4 class="font-bold text-gray-800">Report #${report.id}</h4>
                                <p class="text-xs text-gray-500">${new Date(report.created_at).toLocaleDateString()} • Status: 
                                    <span class="${isApproved ? 'text-green-600 font-bold' : 'text-yellow-600'}">${report.status}</span>
                                </p>
                            </div>
                            <div>
                                ${isApproved ? 
                                    `<a href="${API_BASE}/reports/${report.id}/pdf?copy=patient" target="_blank" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition flex items-center shadow-sm">
                                        Download PDF
                                    </a>` : 
                                    `<span class="text-xs text-gray-400 italic">Processing...</span>`
                                }
                            </div>
                        `;
                        list.appendChild(item);
                    });
                } else {
                    document.getElementById('emptyMsg').classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        fetchPatientReports();
    </script>
</body>
</html>
