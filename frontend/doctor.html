<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Portal - Smart Health</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">🩺 Doctor Portal</h1>
        <div class="flex items-center space-x-4">
            <span id="docName" class="font-medium">Dr. User</span>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm transition">Logout</button>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <h2 class="text-2xl font-semibold mb-6 text-gray-800">Pending Reports for Review</h2>
        
        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-4 text-gray-500">Fetching reports...</p>
        </div>

        <div id="reportContainer" class="grid gap-6">
            <!-- Reports will be injected here -->
        </div>

        <div id="emptyMsg" class="hidden text-center py-20 bg-white rounded-lg border-2 border-dashed">
            <p class="text-gray-400 text-lg">No reports currently awaiting approval.</p>
        </div>
    </div>

    <script>
        const API_BASE = "/api/v1";
        const token = localStorage.getItem('sh_token');

        if (!token || localStorage.getItem('sh_role') !== 'doctor') {
            window.location.href = 'index.html';
        }

        document.getElementById('docName').innerText = "Dr. " + (localStorage.getItem('sh_name') || "User");

        async function fetchReports() {
            try {
                const res = await fetch(`${API_BASE}/reports/pending`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                document.getElementById('loading').classList.add('hidden');
                const container = document.getElementById('reportContainer');
                container.innerHTML = "";

                if (data.data && data.data.length > 0) {
                    data.data.forEach(report => {
                        const card = document.createElement('div');
                        card.className = "bg-white p-6 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition";
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-lg font-bold text-blue-800">Report #${report.id}</h3>
                                    <p class="text-sm text-gray-500">Patient ID: ${report.patient_id} • Created: ${new Date(report.created_at).toLocaleString()}</p>
                                </div>
                                <span class="bg-yellow-100 text-yellow-800 text-xs font-semibold px-2.5 py-0.5 rounded uppercase">${report.status}</span>
                            </div>
                            <div class="bg-gray-50 p-4 rounded mb-4 text-sm text-gray-700 whitespace-pre-wrap font-mono max-h-40 overflow-y-auto">
                                ${report.ai_draft}
                            </div>
                            <div class="flex space-x-3">
                                <button onclick="approveReport(${report.id}, this)" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm font-bold transition">
                                    Approve & Finalize
                                </button>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    document.getElementById('emptyMsg').classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function approveReport(id, btn) {
            const originalText = btn.innerText;
            btn.innerText = "Approving...";
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/reports/${id}/approve`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    alert("Report #" + id + " Approved successfully!");
                    fetchReports();
                } else {
                    alert("Error approving report");
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Network error");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        fetchReports();
    </script>
</body>
</html>
